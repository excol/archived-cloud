apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook
  namespace: knative-serving
spec:
  template:
    spec:
      hostNetwork: true
      containers:
        - name: webhook
          env:
            - name: WEBHOOK_PORT
              value: "18443"
          ports:
            - name: metrics
              containerPort: 9090
              $patch: delete
            - name: profiling
              containerPort: 8008
              $patch: delete
            - name: https-webhook
              containerPort: 8443
              $patch: delete
            - name: metrics
              containerPort: 19090
            - name: profiling
              containerPort: 18008
            - name: https-webhook
              containerPort: 18443
          readinessProbe:
            httpGet:
              port: 18443
          livenessProbe:
            httpGet:
              port: 18443
---
apiVersion: v1
kind: Service
metadata:
  name: webhook
  namespace: knative-serving
spec:
  ports:
    - name: http-metrics
      port: 9090
      targetPort: 19090
    - name: http-profiling
      port: 8008
      targetPort: 18008
    - name: https-webhook
      port: 443
      targetPort: 18443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: domainmapping-webhook
  namespace: knative-serving
spec:
  template:
    spec:
      hostNetwork: true
      containers:
        - name: domainmapping-webhook
          env:
            - name: WEBHOOK_PORT
              value: "28443"
          ports:
            - name: metrics
              containerPort: 9090
              $patch: delete
            - name: profiling
              containerPort: 8008
              $patch: delete
            - name: https-webhook
              containerPort: 8443
              $patch: delete
            - name: metrics
              containerPort: 29090
            - name: profiling
              containerPort: 28008
            - name: https-webhook
              containerPort: 28443
          readinessProbe:
            httpGet:
              port: 28443
          livenessProbe:
            httpGet:
              port: 28443
---
apiVersion: v1
kind: Service
metadata:
  name: domainmapping-webhook
  namespace: knative-serving
spec:
  ports:
    - name: http-metrics
      port: 9090
      targetPort: 29090
    - name: http-profiling
      port: 8008
      targetPort: 28008
    - name: https-webhook
      port: 443
      targetPort: 28443
