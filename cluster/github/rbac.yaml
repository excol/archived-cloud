kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: github-runner-full-access
rules:
  - apiGroups: ["", "extensions", "apps"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["*"]
  - apiGroups: ["serving.knative.dev"]
    resources:
      - services
    verbs: ["*"]
  - apiGroups: ["kubernetes-client.io"]
    resources:
      - externalsecrets
    verbs: ["*"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: github-runner-user-view
  namespace: github
subjects:
  - kind: ServiceAccount
    name: github-runner
    namespace: github
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: github-runner-full-access
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: github-runner-user-view
  namespace: production
subjects:
  - kind: ServiceAccount
    name: github-runner
    namespace: github
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: github-runner-full-access
