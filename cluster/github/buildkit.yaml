apiVersion: v1
kind: Pod
metadata:
  name: buildkitd
  namespace: github
  annotations:
    container.apparmor.security.beta.kubernetes.io/buildkitd: unconfined
    container.seccomp.security.alpha.kubernetes.io/buildkitd: unconfined
# see buildkit/docs/rootless.md for caveats of rootless mode
spec:
  containers:
    - name: buildkitd
      image: moby/buildkit:master-rootless@sha256:fae7a053ed6dc5f7289dfde237a424e35b136af76a7b23f022978bce2d2892e7
      args:
        - --oci-worker-no-process-sandbox
      readinessProbe:
        exec:
          command:
            - buildctl
            - debug
            - workers
        initialDelaySeconds: 5
        periodSeconds: 30
      livenessProbe:
        exec:
          command:
            - buildctl
            - debug
            - workers
        initialDelaySeconds: 5
        periodSeconds: 30
      securityContext:
        # To change UID/GID, you need to rebuild the image
        runAsUser: 1000
        runAsGroup: 1000
